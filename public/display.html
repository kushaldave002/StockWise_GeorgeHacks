<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Display - StockWise</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--green-dark); }
    .snap-banner {
      background: #1565c0;
      color: #fff;
      text-align: center;
      padding: 0.75rem;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .category-label {
      grid-column: 1 / -1;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--green-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div class="snap-banner">SNAP/EBT Accepted Here — Fresh Produce Available Daily</div>

  <div class="display-board">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem">
      <div>
        <h1 id="storeName">Loading...</h1>
        <div class="date" id="storeDate"></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:0.9rem;opacity:0.7">Powered by</div>
        <div style="font-size:1.3rem;font-weight:800">Stock<span style="color:var(--green-light)">Wise</span></div>
      </div>
    </div>

    <div class="display-grid" id="displayGrid">
      <div class="loading"><span class="spinner" style="border-top-color:#fff"></span></div>
    </div>

    <div style="margin-top:2rem;text-align:center;opacity:0.5;font-size:0.9rem">
      Auto-refreshes every 60 seconds &mdash; Prices subject to change
    </div>
  </div>

  <script src="/js/display.js"></script>
</body>
</html>
